<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080C14;
    --surface: #0F1623;
    --card: #141C2E;
    --border: #1E2D45;
    --text: #E8EFF8;
    --muted: #7A90B0;
    --chatbot: #00D4FF;
    --writing: #A78BFA;
    --productivity: #34D399;
    --marketing: #F59E0B;
    --design: #F472B6;
    --video: #FB923C;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── stars bg ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,0.12) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.08) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 90%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(2px 2px at 20% 45%, rgba(0,212,255,0.08) 0%, transparent 100%),
      radial-gradient(2px 2px at 60% 35%, rgba(167,139,250,0.08) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── hero ── */
  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 70px 20px 50px;
  }

  .hero-badge {
    display: inline-block;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--chatbot);
    font-size: 13px;
    font-weight: 700;
    padding: 5px 18px;
    border-radius: 20px;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }

  .hero h1 {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #fff 30%, #7dd3fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    color: var(--muted);
    font-size: 16px;
    max-width: 500px;
    margin: 0 auto 30px;
    line-height: 1.7;
  }

  /* ── filter tabs ── */
  .filters {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 0 20px 50px;
  }

  .filter-btn {
    padding: 8px 20px;
    border-radius: 25px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    color: #fff;
    border-color: currentColor;
  }

  .filter-btn[data-cat="all"].active    { color: #fff; background: rgba(255,255,255,0.08); }
  .filter-btn[data-cat="chatbot"].active    { color: var(--chatbot);     background: rgba(0,212,255,0.1); border-color: var(--chatbot); }
  .filter-btn[data-cat="writing"].active    { color: var(--writing);     background: rgba(167,139,250,0.1); border-color: var(--writing); }
  .filter-btn[data-cat="productivity"].active { color: var(--productivity); background: rgba(52,211,153,0.1); border-color: var(--productivity); }
  .filter-btn[data-cat="marketing"].active  { color: var(--marketing);   background: rgba(245,158,11,0.1); border-color: var(--marketing); }
  .filter-btn[data-cat="design"].active     { color: var(--design);      background: rgba(244,114,182,0.1); border-color: var(--design); }
  .filter-btn[data-cat="video"].active      { color: var(--video);       background: rgba(251,146,60,0.1); border-color: var(--video); }

  /* ── grid ── */
  .grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    padding: 0 30px 80px;
    max-width: 1300px;
    margin: 0 auto;
  }

  /* ── card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 18px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    text-decoration: none;
    color: inherit;
    animation: fadeUp 0.4s ease both;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .card[data-cat="chatbot"]:hover     { border-color: var(--chatbot);     box-shadow: 0 20px 40px rgba(0,212,255,0.15); }
  .card[data-cat="writing"]:hover     { border-color: var(--writing);     box-shadow: 0 20px 40px rgba(167,139,250,0.15); }
  .card[data-cat="productivity"]:hover{ border-color: var(--productivity); box-shadow: 0 20px 40px rgba(52,211,153,0.15); }
  .card[data-cat="marketing"]:hover   { border-color: var(--marketing);   box-shadow: 0 20px 40px rgba(245,158,11,0.15); }
  .card[data-cat="design"]:hover      { border-color: var(--design);      box-shadow: 0 20px 40px rgba(244,114,182,0.15); }
  .card[data-cat="video"]:hover       { border-color: var(--video);       box-shadow: 0 20px 40px rgba(251,146,60,0.15); }

  .card-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .card-icon::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
    border-radius: inherit;
  }

  .card-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
  }

  .card-cat {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
    text-align: center;
  }

  .card[data-cat="chatbot"]      .card-cat { background: rgba(0,212,255,0.12);     color: var(--chatbot); }
  .card[data-cat="writing"]      .card-cat { background: rgba(167,139,250,0.12);   color: var(--writing); }
  .card[data-cat="productivity"] .card-cat { background: rgba(52,211,153,0.12);    color: var(--productivity); }
  .card[data-cat="marketing"]    .card-cat { background: rgba(245,158,11,0.12);    color: var(--marketing); }
  .card[data-cat="design"]       .card-cat { background: rgba(244,114,182,0.12);   color: var(--design); }
  .card[data-cat="video"]        .card-cat { background: rgba(251,146,60,0.12);    color: var(--video); }

  .card-desc {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  .card-link {
    margin-top: auto;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.2s;
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .card:hover .card-link {
    background: rgba(255,255,255,0.06);
    color: #fff;
    border-color: rgba(255,255,255,0.2);
  }

  .card.hidden { display: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── footer ── */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
</style>
</head>

  { name: "Pictory",      cat: "video",        color: "#EC4899", icon: "P",  url: "https://pictory.ai",         desc: "اختصار الفيديوهات الطويلة لمقاطع قصيرة" },
  { name: "Eleven Labs",  cat: "video",        color: "#06B6D4", icon: "11", url: "https://elevenlabs.io",      desc: "استنساخ الصوت وتحويل النص لكلام طبيعي" },
];

function renderCards(filter) {
  const grid = document.getElementById('grid');
  const filtered = filter === 'all' ? tools : tools.filter(t => t.cat === filter);

  grid.innerHTML = '';
  filtered.forEach((t, i) => {
    const a = document.createElement('a');
    a.href = t.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'card';
    a.dataset.cat = t.cat;
    a.style.animationDelay = (i * 0.04) + 's';

    const catLabels = { chatbot:'💬 Chatbot', writing:'✍️ Writing', productivity:'⚡ Productivity', marketing:'📣 Marketing', design:'🎨 Design', video:'🎬 Video' };

    a.innerHTML = `
      <div class="card-icon" style="background:${t.color}">${t.icon}</div>
      <div class="card-name">${t.name}</div>
      <div class="card-cat">${catLabels[t.cat]}</div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-link">فتح الموقع ↗</div>
    `;
    grid.appendChild(a);
  });
}

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.cat);
  });
});

renderCards('all');
</script>
</body>
</html>
